<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Click Into My World</title>

    <!-- CSS Styling -->
    <style>
        /* General Page Styles */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ad9cb4;
            color: #0e1c69;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            color: #860871;
            margin-top: 50px;
            font-size: 2.5em;
        }

        h2 {
            color: #5e343f;
            font-weight: normal;
            margin-bottom: 30px;
        }

        hr {
            width: 60%;
            border: 1px solid #206eb8;
            margin: 30px auto;
        }

        /* Link/Button Styling */
        a {
            display: inline-block;
            background-color: #d1ccd6;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.2em;
            transition: background-color 0.3s ease;
        }

        a:hover {
            background-color: #9b8aa0;
        }

        /* Optional Footer Style */
        footer {
            margin-top: 50px;
            font-size: 0.9em;
            color: #777;
        }
    </style>
</head>
